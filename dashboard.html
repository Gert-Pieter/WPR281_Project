<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="dashboardstyle.css">
    <script src="dashboardscript.js" defer></script>
</head>
<body>
    <nav>
        <h1>
            Bug Tracker
        </h1>
        <ul>
            <li><a href="#" class="active-nav">Home</a></li>
            <li><a href="all_bugs.html">All Reports</a></li>
            <li><a href="#">Add Tickets</a></li>
        </ul>
    </nav>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h1>Bug Details</h1>
            <h2 id="modalTitle"></h2>
            <hr>
            <p><strong>ID:</strong> <span id="modalID"></span></p>
            <p><strong>Status:</strong> <span id="modalPriority"></span></p>
            <p><strong>Project:</strong> <span id="modalProject"></span></p>
            <p><strong>Assigned To:</strong> <span id="modalAssigned"></span></p>
            <p><strong>Subject:</strong> <span id="modalSub"></span></p>
            <hr>
            <div class="modal-description-box">
                <h4>Description:</h4>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <h1>Dashboard</h1>
    
    <div class="fastnums">
        <h2>This Week</h2>
        <div class="newnums">
            <img src="images/list.png">
            <p class="number">4</p>
            <p>Pending</p> 
        </div>
        <div class="inprogressnums">
            <img src="images/hourglass.png">
            <p class="number">4</p>
            <p>In Progress</p>
        </div>
        <div class="completenums">
            <img src="images/check.png" alt="" srcset="">
            <p class="number">4</p>
            <p>Completed</p>
        </div>
    </div>

    <h2>New Bugs</h2>
    <div>
        <ul class="row" id="new-row">
        </ul>
    </div>


    <h2>In Progress</h2>
    <div>
        <ul class="row" id="inprogress">
        </ul>
    </div>

    <h2>Completed Tickets</h2>
    <div>
        <ul class="row" id="archived">
        </ul>
    </div>

    <footer>
        <p class="system">System Status: Online</p>
        <p class="copyright">&copy; Bug Tracker. All rights Reserved.</p>
    </footer>
</body>
</html>
