<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="modifingperson_admin.css">
    <title>Document</title>
    
</head>
<body>
    <header>

    </header>
<center>
    <main>
        <p>
            <fieldset id="addingperson">
                <h1 class="heading">Add New Person</h1>
                <form action="" id="personForm">
                    <input type="text" id="fname" name="fname" required placeholder="First Name" minlength="2" pattern="[A-Za-z\-\`]+" title="First name should be longer then 2, not contain any characters that aren't ` or - and not contain any numbers."> 
                    <!-- Form validation is in place it checks that the minal is at least above 2 and that it allowee -->
                    <br/>
                    <input type="text" id="lname" name="lname" required placeholder="Last Name" minlength="3" pattern="[A-Za-z\-\`\s]+" title="Sure name should be longer then 2, not contain any characters that aren't ` or - and not contain any numbers.">
                    <br/>
                    <input type="email" id="email" name="email" required placeholder="Person email">
                    <br>
                    <a id="email-wrong"></a>
                    <br/>
                    <label class="customName">
                    <input type="file" name="pPic" id="pPic" accept="image/*">upload picture
                    </label>
                    <br/>
                    <img id="preview" src="images/default.profile.pic.jpg" alt="Profile Picuture Preview">
                    <br/>
                    <button type="submit">Add person</button>
                    <br>
                    <a id="successful"></a>
                </form>
            </fieldset><br><br>
            <fieldset id="removingperson" >
                <h1 class="heading">Remove a person </h1>
                <form action="" id="removepersonform">
                    <!-- <label for="fname">First Name:</label> -->
                    <input type="text" id="uname" name="uname" required placeholder="User name">
                    <br/>
                    <input type="email" id="email" name="email" required placeholder="Person email">
                    <br/>
                    <button type="submit">Remove Person</button>
                    <br><a id="message"> </a>
                </form>
            </fieldset>
        </p>
        <script src="local_storage.js"></script>
    </main>
</center>
    <footer>

    </footer>
</body>
</html>
