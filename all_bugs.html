<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="allbugstyle.css">
    <script src="allbugscript.js" defer></script> 
</head>
<body>
    <nav>
        <h1>
            Bug Tracker
        </h1>
        <ul>
            <li><a href="/dashboard/dashboard.html">Home</a></li>
            <li><a href="#" class="active-nav">All Reports</a></li>
            <li><a href="/add/add_tickets.html">Add Tickets</a></li>
        </ul>
    </nav>
    <h1>All Bugs</h1>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h1>Bug Details</h1>
            <h2 id="modalTitle"></h2>
            <hr>
            <p><strong>ID:</strong> <span id="modalID"></span></p>
            <p><strong>Status:</strong> <span id="modalPriority"></span></p>
            <p><strong>Project:</strong> <span id="modalProject"></span></p>
            <p><strong>Assigned To:</strong> <span id="modalAssigned"></span></p>
            <p><strong>Subject:</strong> <span id="modalSub"></span></p>
            <hr>
            <div class="modal-description-box">
                <h4>Description:</h4>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <div class="allbugs">
        <div class="sidepanel">
            <div class="priorityfilters">
                <h4>Priority Level</h4>
                    <p><input type="checkbox" name="priority" value="Critical" class="priority-check filter-check">Critical</p>
                    <p><input type="checkbox" name="priority" value="Medium" class="priority-check filter-check">Medium</p>
                    <p><input type="checkbox" name="priority" value="Low" class="priority-check filter-check">Low</p>
            </div>
            <div class="projectfilters">
                <h4>Project</h4>
                    <p><input type="checkbox" name="project" value="ProjectMD12" class="project-check filter-check">ProjectMD12</p>
                    <p><input type="checkbox" name="project" value="ProjectCD85" class="project-check filter-check">ProjectCD85</p>
            </div>
            <div class="filter-group">
                <h3>Date Issued</h3>
                <input type="date" id="startDate" class="date-filter"> - <input type="date" id="endDate" class="date-filter">
            </div>
        </div>
        <div class="search">
            Search: <input type="text" class="search-filter" id="search">
        </div>
        <div class="buglist" id="buglist">

        </div>
    </div>

    <footer>
        <p class="system">System Status: Online</p>
        <p class="copyright">&copy; Bug Tracker. All rights Reserved.</p>
    </footer>
</body>
</html>
